name = "yildiz-avcilari"
pages_build_output_dir = "public"
compatibility_date = "2026-06-01"

# D1: kullanici / tamamlama / sezon (gorev katalogu kodda sabit)
[[d1_databases]]
binding = "DB"
database_name = "yildiz-db"
database_id = "e4cd69a3-958f-4028-bbb7-b08a33cc7d2c"

# R2: foto kanitlari
[[r2_buckets]]
binding = "PROOFS"
bucket_name = "yildiz-proofs"

# Secret'lar (wrangler pages secret put ile):
#   SESSION_SECRET     - oturum token imzasi (HMAC)
#   ANTHROPIC_API_KEY  - ogrenme gorevi AI degerlendirmesi
