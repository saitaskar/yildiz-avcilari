<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Yıldız Avcıları</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6C2BD9">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Yıldız">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="/fonts.css">
<style>
  :root{
    --primary:#6C2BD9;      /* mor */
    --primary-dark:#4A148C;
    --accent:#FF7A18;       /* turuncu */
    --green:#2E7D32;
    --red:#C62828;
    --amber:#F9A825;
    --blue:#0066FF;
    --bg:#F4F1FB;
    --card:#FFFFFF;
    --text:#1F1235;
    --muted:#7A6F94;
    --line:#E7E0F5;
    --radius:18px;
    --shadow:0 6px 24px rgba(76,20,140,.10);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .hidden{display:none !important;}
  button{font-family:inherit;cursor:pointer;border:none;}
  input,textarea,select{font-family:inherit;font-size:16px;}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(135deg,var(--primary),var(--primary-dark));
    color:#fff;padding:14px 18px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 4px 16px rgba(0,0,0,.12);
  }
  .topbar .brand{font-weight:800;font-size:18px;letter-spacing:.3px;display:flex;align-items:center;gap:8px;}
  .topbar .who{font-size:13px;opacity:.92;display:flex;align-items:center;gap:10px;}
  .topbar .who b{font-weight:700;}
  .btn-logout{background:rgba(255,255,255,.18);color:#fff;border-radius:12px;padding:7px 12px;font-size:13px;font-weight:600;}
  .notif-badge{background:#FF3B30;color:#fff;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:800;}
  .btn-logout:active{background:rgba(255,255,255,.3);}

  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 80px;}

  /* ---------- Cards ---------- */
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;}
  .card h2{margin:0 0 4px;font-size:17px;}
  .card .sub{color:var(--muted);font-size:13px;margin-bottom:14px;}

  /* ---------- Login ---------- */
  /* ----- sevimli yildiz/uzay temali giris ekrani ----- */
  #loginView{position:relative;min-height:100vh;background:linear-gradient(180deg,#0E0A2A 0%,#1A1147 55%,#2A1A5E 100%);overflow:hidden;}
  #loginView::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background-image:radial-gradient(1.5px 1.5px at 24px 30px,#fff,transparent),radial-gradient(1.5px 1.5px at 130px 80px,rgba(255,255,255,.55),transparent),radial-gradient(2px 2px at 220px 50px,#fff,transparent),radial-gradient(1.5px 1.5px at 300px 140px,rgba(255,255,255,.6),transparent),radial-gradient(1.5px 1.5px at 80px 180px,rgba(255,255,255,.45),transparent);
    background-repeat:repeat;background-size:340px 220px;opacity:.5;animation:twk 6s ease-in-out infinite;}
  #loginView::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(520px 360px at 50% -8%,rgba(108,43,217,.55),transparent),radial-gradient(440px 320px at 88% 16%,rgba(255,111,181,.22),transparent),radial-gradient(440px 320px at 6% 70%,rgba(94,231,255,.16),transparent);}
  #loginView .wrap{position:relative;z-index:1;}
  @keyframes twk{0%,100%{opacity:.35}50%{opacity:.62}}
  .login-hero{position:relative;z-index:1;text-align:center;padding:48px 16px 6px;}
  .login-hero .logo{font-size:64px;filter:drop-shadow(0 0 18px rgba(255,209,102,.85));animation:bob 3s ease-in-out infinite;display:inline-block;}
  .login-hero h1{margin:10px 0 4px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:34px;color:#fff;letter-spacing:.01em;text-shadow:0 2px 22px rgba(108,43,217,.55);}
  .login-hero p{color:rgba(255,255,255,.8);margin:0;font-size:15px;font-weight:600;}
  #authCard{position:relative;z-index:1;border-radius:22px;box-shadow:0 26px 64px -22px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.06);}
  #authCard .seg button{font-family:'Fredoka',sans-serif;}
  #authCard #authSubmit{font-family:'Fredoka',sans-serif;font-size:17px;letter-spacing:.01em;}
  .role-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:18px 0;}
  .role-btn{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:16px 8px;text-align:center;font-weight:700;font-size:13px;color:var(--text);transition:.15s;}
  .role-btn .ico{font-size:30px;display:block;margin-bottom:6px;}
  .role-btn.active{border-color:var(--primary);background:#F3ECFF;color:var(--primary-dark);}
  .name-list{display:flex;flex-direction:column;gap:8px;margin-top:6px;}
  .name-item{display:flex;align-items:center;gap:12px;background:#FAF8FF;border:2px solid var(--line);border-radius:14px;padding:12px 14px;font-weight:600;transition:.15s;}
  .name-item .av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;background:#EDE4FF;flex-shrink:0;}
  .name-item small{display:block;color:var(--muted);font-weight:500;font-size:12px;}
  .name-item.active{border-color:var(--primary);background:#F3ECFF;}
  .pin-box{margin-top:16px;text-align:center;}
  .pin-dots{display:flex;justify-content:center;gap:12px;margin:14px 0;}
  .pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--primary);}
  .pin-dot.filled{background:var(--primary);}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
  .key{background:#fff;border:2px solid var(--line);border-radius:14px;padding:16px 0;font-size:22px;font-weight:700;color:var(--text);}
  .key:active{background:#F3ECFF;}
  .key.wide{font-size:15px;font-weight:600;color:var(--muted);}
  .pin-err{color:var(--red);font-size:13px;font-weight:600;height:18px;}

  /* ---------- Silhouette / progress ---------- */
  .hero-card{background:linear-gradient(160deg,#3A1D6E,#6C2BD9);color:#fff;position:relative;overflow:hidden;}
  .hero-card h2{color:#fff;}
  .hero-card .sub{color:rgba(255,255,255,.75);}
  .silo-stage{position:relative;height:200px;display:flex;align-items:center;justify-content:center;margin:6px 0 10px;}
  .silo-glow{position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,122,24,.45),transparent 65%);filter:blur(8px);}
  .silo-img{position:relative;width:160px;height:auto;transition:filter 1s ease, opacity 1s ease;}
  .silo-q{position:absolute;font-size:90px;font-weight:900;color:rgba(255,255,255,.85);text-shadow:0 4px 18px rgba(0,0,0,.3);transition:opacity .6s;}
  .reveal-label{text-align:center;font-weight:700;font-size:15px;margin-top:2px;min-height:20px;}
  .xpbar-wrap{margin-top:10px;}
  .xpbar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;font-weight:600;}
  .xpbar{height:16px;background:rgba(255,255,255,.18);border-radius:10px;overflow:hidden;}
  .xpbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#FFD166);border-radius:10px;width:0;transition:width 1s ease;}
  .pct-big{font-size:13px;opacity:.85;text-align:center;margin-top:8px;}

  /* ---------- Task list ---------- */
  .seg{display:flex;gap:8px;margin-bottom:14px;background:rgba(255,255,255,.07);padding:5px;border-radius:14px;}
  .seg button{flex:1;background:transparent;border-radius:10px;padding:9px 0;font-weight:700;font-size:13px;color:var(--muted);}
  .seg button.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .seg-badge{display:inline-block;min-width:17px;height:17px;line-height:17px;padding:0 4px;margin-left:5px;border-radius:9px;background:#FF3B30;color:#fff;font-size:11px;font-weight:800;vertical-align:middle;}
  .week-warn{display:flex;align-items:center;gap:9px;padding:11px 13px;border-radius:12px;margin-bottom:12px;background:rgba(255,59,48,.10);border:1px solid rgba(255,59,48,.35);font-size:13px;font-weight:600;color:var(--text);}
  .week-warn .ww-ico{font-size:20px;line-height:1;flex-shrink:0;}

  .task{display:flex;align-items:center;gap:12px;padding:12px;border:2px solid var(--line);border-radius:14px;margin-bottom:10px;transition:.15s;}
  .task .t-ico{width:46px;height:46px;border-radius:12px;background:#F3ECFF;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .task .t-body{flex:1;min-width:0;}
  .task .t-title{font-weight:700;font-size:15px;}
  .task .t-meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .chip.xp{background:#FFF1E0;color:var(--accent);}
  .chip.win{background:#E8F0FF;color:var(--blue);}
  .chip.done{background:#E6F4EA;color:var(--green);}
  .chip.pending{background:#FFF8E1;color:#B7791F;}
  .chip.count{background:#F0ECFA;color:var(--primary);}
  .chip.streak{background:#FFE8D6;color:#D2691E;}
  .t-action{flex-shrink:0;}
  .btn-do{background:var(--primary);color:#fff;border-radius:12px;padding:10px 16px;font-weight:700;font-size:14px;}
  .btn-do:active{background:var(--primary-dark);}
  .btn-do:disabled{background:#D8CFEC;color:#fff;}
  .task.locked{opacity:.55;}
  .task.complete{border-color:rgba(46,125,50,.55);background:rgba(46,125,50,.13);}
  .task.waiting{border-color:rgba(249,168,37,.55);background:rgba(249,168,37,.13);}

  /* ---------- Approver ---------- */
  .approve-card{border:2px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .approve-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .approve-head .av{width:34px;height:34px;border-radius:50%;background:#EDE4FF;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .approve-head b{font-size:14px;}
  .approve-head small{color:var(--muted);font-size:12px;display:block;}
  .proof-box{background:var(--bg);border-radius:12px;padding:10px 12px;font-size:14px;margin:8px 0;border:1px solid var(--line);}
  .proof-box img{max-width:100%;border-radius:10px;margin-top:6px;display:block;}
  .ai-note{background:#EEF6FF;border-left:3px solid var(--blue);padding:8px 12px;border-radius:8px;font-size:13px;margin:8px 0;color:#1A4D8F;}
  .approve-actions{display:flex;gap:10px;margin-top:10px;}
  .btn-ok{flex:1;background:var(--green);color:#fff;border-radius:12px;padding:11px;font-weight:700;}
  .btn-no{flex:1;background:#fff;border:2px solid var(--red);color:var(--red);border-radius:12px;padding:11px;font-weight:700;}

  /* ---------- Leaderboard ---------- */
  .lb-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{width:30px;text-align:center;font-weight:800;font-size:18px;color:var(--muted);}
  .lb-rank.gold{color:#E8A100;}
  .lb-av{width:40px;height:40px;border-radius:50%;background:#EDE4FF;display:flex;align-items:center;justify-content:center;font-size:20px;}
  .lb-body{flex:1;}
  .lb-body b{font-size:15px;}
  .lb-mini{height:8px;background:#EFE9FB;border-radius:6px;margin-top:5px;overflow:hidden;}
  .lb-mini span{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#FFD166);}
  .lb-xp{font-weight:800;color:var(--primary);font-size:15px;}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(31,18,53,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0;}
  .modal{background:var(--card);color:var(--text);border-radius:22px 22px 0 0;width:100%;max-width:760px;padding:22px 20px 30px;animation:slideUp .25s ease;}
  .modal input,.modal textarea,.modal select{background:var(--bg);color:var(--text);}
  @keyframes slideUp{from{transform:translateY(40px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
  .modal h3{margin:0 0 4px;font-size:18px;}
  .modal .msub{color:var(--muted);font-size:13px;margin-bottom:14px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-weight:600;font-size:13px;margin-bottom:6px;}
  .field textarea,.field input[type=text]{width:100%;border:2px solid var(--line);border-radius:12px;padding:12px;resize:vertical;}
  .field textarea:focus,.field input:focus{outline:none;border-color:var(--primary);}
  .photo-pick{border:2px dashed var(--line);border-radius:14px;padding:20px;text-align:center;color:var(--muted);font-size:14px;}
  .photo-pick img{max-width:100%;border-radius:10px;margin-top:8px;}
  .modal-actions{display:flex;gap:10px;margin-top:6px;}
  .btn-primary{flex:1;background:var(--primary);color:#fff;border-radius:14px;padding:14px;font-weight:700;font-size:15px;}
  .btn-ghost{background:#F0ECFA;color:var(--muted);border-radius:14px;padding:14px 18px;font-weight:700;}

  /* ---------- Admin ---------- */
  .admin-task{display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--line);font-size:14px;}
  .admin-task .e{font-size:22px;}
  .admin-task .g{flex:1;}
  .admin-task small{color:var(--muted);font-size:12px;}
  .kv{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .kv b{color:var(--primary-dark);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.3);animation:pop .3s ease;}
  @keyframes pop{from{transform:translateX(-50%) scale(.9);opacity:0;}to{transform:translateX(-50%) scale(1);opacity:1;}}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px;}
  .empty .e{font-size:40px;display:block;margin-bottom:8px;}

  /* ---------- RPG WIZARD ---------- */
  .wizard{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:26px 20px;text-align:center;overflow-y:auto;background:#070A14;color:#fff;}
  .wizard.starfield{background:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 60%,#fff,transparent),radial-gradient(2px 2px at 40% 80%,#9bd,transparent),radial-gradient(1px 1px at 85% 25%,#fff,transparent),radial-gradient(1px 1px at 55% 15%,#fff,transparent),linear-gradient(160deg,#0A0E1A,#1A1040);}
  .cine{max-width:600px;animation:fadeUp .8s ease;}
  .cine .badge{font-size:13px;letter-spacing:4px;color:#FFD166;font-weight:800;margin-bottom:18px;}
  .cine h1{font-size:30px;margin:0 0 16px;line-height:1.25;background:linear-gradient(90deg,#FFD166,#FF7A18);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .cine p{font-size:16px;color:#C9D4F0;line-height:1.6;margin:0 0 28px;}
  .cine .blink{animation:blink 1.4s infinite;}
  @keyframes blink{50%{opacity:.3;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .btn-cine{background:linear-gradient(90deg,#FF7A18,#FFD166);color:#1A0F00;border-radius:30px;padding:15px 40px;font-weight:800;font-size:16px;box-shadow:0 8px 30px rgba(255,122,24,.4);}
  .btn-cine:active{transform:scale(.97);}

  .wiz-title{font-size:22px;font-weight:800;margin:0 0 6px;}
  .wiz-sub{color:#9FB0D8;font-size:14px;margin:0 0 22px;}
  .class-grid{display:flex;flex-direction:column;gap:14px;width:100%;max-width:440px;}
  .class-card{border:2px solid rgba(255,255,255,.12);border-radius:20px;padding:18px;text-align:left;display:flex;gap:14px;align-items:center;cursor:pointer;transition:.18s;position:relative;overflow:hidden;}
  .class-card:active{transform:scale(.98);}
  .class-card .cc-ico{font-size:42px;flex-shrink:0;width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;}
  .class-card .cc-name{font-weight:800;font-size:17px;}
  .class-card .cc-class{font-size:12px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
  .class-card .cc-desc{font-size:12px;color:#B9C4E4;margin-top:4px;line-height:1.4;}
  .class-card .cc-arrow{margin-left:auto;font-size:22px;opacity:.6;}

  .bot-stage{max-width:460px;width:100%;animation:fadeUp .5s ease;}
  .bot-avatar{font-size:72px;margin-bottom:6px;animation:bob 2.4s ease-in-out infinite;}
  @keyframes bob{50%{transform:translateY(-10px);}}
  @keyframes fbpop{from{transform:scale(.4) translateY(24px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
  .bot-name{font-weight:800;font-size:15px;letter-spacing:1px;margin-bottom:14px;}
  .bot-bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:18px 20px;font-size:15px;line-height:1.6;color:#EAF0FF;min-height:90px;text-align:left;}
  .bot-dots{display:flex;justify-content:center;gap:8px;margin:18px 0;}
  .bot-dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.25);}
  .bot-dot.on{background:#FFD166;width:22px;border-radius:5px;}
  .wiz-nav{display:flex;gap:12px;justify-content:center;}
  .theme-switch{font-size:12px;color:var(--muted);background:#F0ECFA;border-radius:20px;padding:6px 12px;font-weight:600;}

  /* ---------- LEARN CHAT ---------- */
  .chat-msgs{max-height:46vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding:8px 2px;margin-bottom:10px;}
  .chat-bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;max-width:88%;word-wrap:break-word;}
  .chat-bubble.bot{background:var(--line);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;}
  .chat-bubble.me{background:var(--primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
  .chat-input-row{display:flex;gap:8px;}
  .chat-input-row input{flex:1;border:2px solid var(--line);border-radius:12px;padding:12px;min-width:0;}
  .chat-input-row input:focus{outline:none;border-color:var(--primary);}
  .chat-input-row input:disabled{background:#F4F1FB;}

  /* emoji secici (ekstra gorev) */
  .emoji-pick{font-size:22px;background:var(--bg);border:2px solid var(--line);border-radius:12px;width:46px;height:46px;cursor:pointer;line-height:1;}
  .emoji-pick.sel{border-color:var(--primary);background:var(--line);}

  /* ara odul checkpoint'leri (hero kart icinde) */
  .cp-tick{position:absolute;top:0;width:3px;height:100%;background:rgba(255,255,255,.55);transform:translateX(-50%);border-radius:2px;pointer-events:none;z-index:2;}
  .cp-tick.on{background:#FFD166;box-shadow:0 0 7px rgba(255,209,102,.95);}
  .cp-mark{position:absolute;top:-18px;transform:translateX(-50%);font-size:13px;filter:grayscale(1);opacity:.55;pointer-events:none;}
  .cp-mark.on{filter:none;opacity:1;}
  .cp-list{margin-top:12px;display:flex;flex-direction:column;gap:6px;}
  .cp-item{display:flex;justify-content:space-between;gap:10px;font-size:13px;background:rgba(255,255,255,.1);border-radius:10px;padding:7px 12px;color:rgba(255,255,255,.72);}
  .cp-item.on{background:rgba(255,209,102,.22);color:#FFE9B0;font-weight:700;}

  /* rozetler */
  .badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:8px;}
  .badge{text-align:center;padding:12px 6px;border:2px solid var(--line);border-radius:14px;opacity:.4;filter:grayscale(1);transition:.2s;}
  .badge.on{opacity:1;filter:none;border-color:var(--accent);background:rgba(255,122,24,.12);}
  .badge .b-e{font-size:30px;line-height:1;}
  .badge .b-n{font-size:11px;font-weight:700;margin-top:5px;color:var(--text);}

  /* konfeti */
  .confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:250;overflow:hidden;}
  .confetti{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:confFall 2.3s linear forwards;}
  @keyframes confFall{to{transform:translateY(110vh) rotate(560deg);opacity:.7;}}
</style>

async function api(path, opts={}){
  const headers = Object.assign({}, opts.headers||{});
  if(authToken) headers["Authorization"] = "Bearer "+authToken;
  if(opts.body) headers["content-type"] = "application/json";
  const r = await fetch(API+path, {method:opts.method||"GET", headers,
    body: opts.body?JSON.stringify(opts.body):undefined});
  const data = await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(data.error || ("HTTP "+r.status));
  return data;
}
async function refreshState(){
  if(authMode==="parent"){   // ebeveyn modu: hesap token'i ile aile durumu
    const d = await api("/account/family-state?familyId="+encodeURIComponent(currentFamilyId));
    const kids = (d.users||[]).filter(u=>u.role==="child").map(u=>u.id);
    state = { season:d.season, users:d.users||[], completions:d.completions||[], customTasks:d.customTasks||[], checkpoints:d.checkpoints||[], chatLogs:d.chatLogs||[], rewards:d.rewards||[], family:d.family||null };
    session = { id:"acc:"+(account?account.id:""), role:"approver", name:(account?(account.name||account.email):"Ebeveyn"), title:"Ebeveyn", av:"👤", kids, isRoot:0 };
    return;
  }
  const d = await api("/state");   // cocuk veya root token'i
  if(d.root){ state = { root:true, stats:d.stats||{}, families:d.families||[], chatLogs:d.chatLogs||[], feedback:d.feedback||[] }; if(d.me) session=d.me; return; }
  state = { season:d.season, users:d.users||[], completions:d.completions||[], customTasks:d.customTasks||[], checkpoints:d.checkpoints||[], chatLogs:d.chatLogs||[], rewards:d.rewards||[], family:d.family||null };
  // session null olabilir (cocuk moduna girerken); /state d.me'yi (cocugun kendisi) doner -> onu kullan
  if(d.me) session = d.me;
  else if(session){ const me = (d.users||[]).find(u=>u.id===session.id); if(me) session = me; }
}

/* kanit fotograflarini Authorization header ile cek (token URL'ye GIRMEZ) -> blob */
async function hydrateProofs(){
  const imgs = document.querySelectorAll("img.proofimg[data-key]");
  for(const img of imgs){
    if(img.dataset.loaded) continue;
    const path = (authMode==="parent" ? "/account/proof/" : "/proof/") + img.dataset.key;
    try{
      const r = await fetch(API+path, {headers:{Authorization:"Bearer "+authToken}});
      if(r.ok){ img.src = URL.createObjectURL(await r.blob()); img.dataset.loaded="1"; }
    }catch(e){}
  }
}

function saveToken(id, token){
  try{ const a=JSON.parse(localStorage.getItem(TOKEN_STORE)||"{}"); a[id]={token, exp:Date.now()+TOKEN_LIFE}; localStorage.setItem(TOKEN_STORE, JSON.stringify(a)); }catch(e){}

}

  try{ const a=JSON.parse(localStorage.getItem(TOKEN_STORE)||"{}"); delete a[id]; localStorage.setItem(TOKEN_STORE, JSON.stringify(a)); }catch(e){}
}

/* ======================= HELPERS ======================= */
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function nowHour(){ return new Date().getHours() + new Date().getMinutes()/60; }
function weekKey(){ // ISO-ish week bucket
  const d=new Date(); const onejan=new Date(d.getFullYear(),0,1);
  const wk=Math.ceil((((d-onejan)/86400000)+onejan.getDay()+1)/7);
  return d.getFullYear()+"-W"+wk;
}
function inWindow(task){ const h=nowHour(); return h>=task.win[0] && h<task.win[1]; }
function winLabel(task){
  if(task.win[0]===0 && task.win[1]===24) return "Gün boyu";
  const f=n=>String(n).padStart(2,"0")+":00";
  return f(task.win[0])+"-"+f(task.win[1]);
}

/* completions for a child today / this week */
function compsFor(userId, taskId, period){
  return state.completions.filter(c=>{
    if(c.userId!==userId || c.taskId!==taskId) return false;
    if(period==="day") return c.date===todayStr();
    if(period==="week") return c.week===weekKey();
    return true;
  });
}

/* asagidaki sabitler + seri mantigi backend computeXP ile ESLESMELI */
const CUSTOM_WEEKLY_CAP = 150;   // aile gorevleri sezon toplamina haftada en fazla bu kadar katar
const STREAK_MIN = 3;            // bir gunluk gorevi bu kadar gun ust uste yapinca bonus baslar
const STREAK_BONUS = 5;          // her bonus gunu (gun 3+) icin ekstra yildiz
function dayDiff(a,b){ return Math.round((Date.parse(b+"T00:00:00Z") - Date.parse(a+"T00:00:00Z"))/86400000); }
function runStreakBonus(dates){
  const ds=[...new Set(dates)].sort();
  if(!ds.length) return 0;
  let bonus=0, run=1;
  for(let i=1;i<ds.length;i++){
    if(dayDiff(ds[i-1],ds[i])===1) run++;
    else { bonus += Math.max(0, run-(STREAK_MIN-1))*STREAK_BONUS; run=1; }
  }
  return bonus + Math.max(0, run-(STREAK_MIN-1))*STREAK_BONUS;
}
function userXP(userId){
  const comps = state.completions.filter(c=>c.userId===userId && c.status==="approved");
  let total=0; const customByWeek={}; const dailyDates={};
  for(const c of comps){
    const cat = TASKS.find(x=>x.id===c.taskId);          // kodda sabit katalog gorevi
    if(cat){
      total += cat.xp;
      if(cat.type==="daily") (dailyDates[cat.id]=dailyDates[cat.id]||[]).push(c.date);
    }
    else { customByWeek[c.week] = (customByWeek[c.week]||0) + xpForTask(c.taskId); }  // aile gorevi: haftaya gore topla
  }
  for(const w in customByWeek) total += Math.min(CUSTOM_WEEKLY_CAP, customByWeek[w]);
  for(const tid in dailyDates) total += runStreakBonus(dailyDates[tid]);   // gunluk seri bonusu
  return total;
}
/* bir gunluk gorevin GUNCEL serisi (bugun veya dunde biten ardisik gun sayisi) - kart rozeti icin */
function taskStreak(userId, taskId){
  const dates = new Set(state.completions.filter(c=>c.userId===userId && c.status==="approved" && c.taskId===taskId).map(c=>c.date));
  if(!dates.size) return 0;
  const fmt = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const d = new Date();
  if(!dates.has(fmt(d))) d.setDate(d.getDate()-1);   // bugun bos ise dunden say
  let s=0;
  while(dates.has(fmt(d))){ s++; d.setDate(d.getDate()-1); }
  return s;
}
/* ardisik gun serisi (streak): o gun en az 1 onayli gorev = seri devam.
   bugun henuz yapilmadiysa seri kirilmaz (dunden sayilir). */
function userStreak(userId){
  const dates = new Set(state.completions.filter(c=>c.userId===userId && c.status==="approved").map(c=>c.date));
  if(!dates.size) return 0;
  const fmt = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  const d = new Date();
  if(!dates.has(fmt(d))) d.setDate(d.getDate()-1);   // bugun bos ise dunden basla
  let streak=0;
  while(dates.has(fmt(d))){ streak++; d.setDate(d.getDate()-1); }
  return streak;
}

function timeAgo(ts){
  if(!ts) return ""; const d=Math.floor((Date.now()-ts)/1000);
  if(d<60) return "az önce"; if(d<3600) return Math.floor(d/60)+" dk önce";
  if(d<86400) return Math.floor(d/3600)+" sa önce"; if(d<604800) return Math.floor(d/86400)+" gün önce";
  return new Date(ts).toLocaleDateString("tr-TR");
}

/* ---- HESAP (account) auth: email+parola / Google / e-postaya-kod ---- */
let authMode = "account";   // "account" | "child" | "parent" | "root"
let account = null;         // {id,email,name}
let accountFamilies = [];   // /account/state -> families
let currentFamilyId = null; // ebeveyn modunda secili aile
let authTab = "login";
let appConfig = { google:false, googleClientId:null, emailCode:false };
let pendingInvite = null;
const ACC_TOKEN_KEY = "gp_acc_token";   // kalici hesap oturumu (storage temizlenene kadar)

function setAuthTab(t){
  authTab = t;
  document.getElementById("tabLogin").classList.toggle("active", t==="login");
  document.getElementById("tabSignup").classList.toggle("active", t==="signup");
  document.getElementById("authName").classList.toggle("hidden", t!=="signup");
  document.getElementById("consentRow").classList.toggle("hidden", t!=="signup");   // rıza yalniz kayitta
  document.getElementById("authPass").setAttribute("autocomplete", t==="signup"?"new-password":"current-password");
  document.getElementById("authSubmit").textContent = t==="signup"?"Kayıt ol":"Giriş yap";
  document.getElementById("authErr").textContent="";
}
async function loadConfig(){
  try{ appConfig = await api("/config"); }catch(e){ appConfig={google:false,emailCode:false}; }
  const ec=document.getElementById("authEmailCodeBtn"); if(ec) ec.classList.toggle("hidden", !appConfig.emailCode);
  const dv=document.getElementById("authAltDivider"); if(dv) dv.classList.toggle("hidden", !((appConfig.google&&appConfig.googleClientId)||appConfig.emailCode));
  if(appConfig.google && appConfig.googleClientId) initGoogle(appConfig.googleClientId);
}
async function submitAuth(){
  const email=document.getElementById("authEmail").value.trim().toLowerCase();
  const pass=document.getElementById("authPass").value;
  const name=document.getElementById("authName").value.trim();
  const err=document.getElementById("authErr"); err.textContent="";
  if(!email||!pass){ err.textContent="E-posta ve parola gir"; return; }
  if(authTab==="signup" && !document.getElementById("authConsent").checked){ err.textContent="Devam etmek için Koşullar ve Gizlilik'i kabul et"; return; }
  err.textContent="Lütfen bekle...";
  try{
    const reqBody = authTab==="signup" ? {email, password:pass, name, consent:true} : {email, password:pass};   // consent: checkbox yukarida gate'li
    const d = await api(authTab==="signup"?"/auth/register":"/auth/login", {method:"POST", body:reqBody});
    onAccountAuthed(d);
  }catch(e){ err.textContent = e.message || "Giriş başarısız"; }
}
function onAccountAuthed(d){
  authToken = d.token; account = d.account; authMode="account";
  localStorage.setItem(ACC_TOKEN_KEY, d.token);
  if(pendingInvite){ const t=pendingInvite; pendingInvite=null; tryAcceptInvite(t).finally(showAccountHome); }
  else showAccountHome();
}
async function tryAcceptInvite(tok){
  try{ await api("/account/accept-invite",{method:"POST",body:{token:tok}}); toast("Aileye katıldın 🎉"); }
  catch(e){ toast(e.message||"Davet kabul edilemedi"); }
  finally{ try{ history.replaceState(null,"",location.pathname); }catch(e){} }   // ?invite'i temizle
}

/* --- Google Identity (env'de GOOGLE_CLIENT_ID varsa) --- */
let _googleInited=false;
function initGoogle(clientId){
  const mount=document.getElementById("authGoogle"); if(!mount || _googleInited) return;
  const s=document.createElement("script"); s.src="https://accounts.google.com/gsi/client"; s.async=true; s.defer=true;
  s.onload=()=>{ try{
    google.accounts.id.initialize({ client_id:clientId, callback:onGoogleCredential });
    google.accounts.id.renderButton(mount, { theme:"outline", size:"large", width:360, text:"continue_with", shape:"pill", locale:"tr" });
    _googleInited=true;
  }catch(e){} };
  document.head.appendChild(s);
}
async function onGoogleCredential(resp){
  const err=document.getElementById("authErr"); err.textContent="Google ile giriliyor...";
  try{ onAccountAuthed(await api("/auth/google",{method:"POST",body:{credential:resp.credential}})); }
  catch(e){ err.textContent="Google girişi başarısız"; }
}

/* --- e-postaya kod (passwordless) --- */
async function startEmailCode(){
  const email=document.getElementById("authEmail").value.trim().toLowerCase();
  const err=document.getElementById("authErr");
  if(!email){ err.textContent="Önce e-postanı yaz"; return; }
  err.textContent="Kod gönderiliyor...";
  try{
    await api("/auth/email-code/request",{method:"POST",body:{email}}); err.textContent="";
    showModal(`<div style="text-align:center"><div style="font-size:40px">✉️</div><h3>Kodu gir</h3>
      <div class="sub" style="margin:8px 0">${escapeHtml(email)} adresine 6 haneli kod gönderdik.</div>
      <input id="ecInput" inputmode="numeric" maxlength="6" placeholder="000000" style="width:100%;box-sizing:border-box;padding:13px;font-size:22px;text-align:center;letter-spacing:6px;border:2px solid var(--line);border-radius:12px;margin-bottom:8px">
      <div class="pin-err" id="ecErr"></div>
      <button class="btn-primary" style="width:100%" onclick="verifyEmailCode('${encodeURIComponent(email)}')">Giriş yap</button></div>`);
    setTimeout(()=>{const i=document.getElementById("ecInput");if(i)i.focus();},150);
  }catch(e){ err.textContent = e.message||"Gönderilemedi"; }
}
async function verifyEmailCode(emailEnc){
  const email=decodeURIComponent(emailEnc);
  const code=document.getElementById("ecInput").value.trim();
  const err=document.getElementById("ecErr"); err.textContent="";
  try{ const d=await api("/auth/email-code/verify",{method:"POST",body:{email,code}}); closeModal(); onAccountAuthed(d); }
  catch(e){ err.textContent=e.message||"Kod hatalı"; }
}

/* --- root (sistem) girisi: ayri kod + PIN --- */
function rootLoginPrompt(){
  showModal(`<div style="text-align:center"><div style="font-size:34px">🛡️</div><h3>Sistem yönetimi</h3>
    <input id="rootCode" placeholder="Root kodu" autocapitalize="characters" style="width:100%;box-sizing:border-box;padding:12px;border:2px solid var(--line);border-radius:10px;margin:10px 0 6px;text-align:center;text-transform:uppercase">
    <input id="rootPin" inputmode="numeric" type="password" placeholder="PIN" style="width:100%;box-sizing:border-box;padding:12px;border:2px solid var(--line);border-radius:10px;margin-bottom:6px;text-align:center">
    <div class="pin-err" id="rootErr"></div>
    <button class="btn-primary" style="width:100%" onclick="rootLogin()">Gir</button></div>`);
}
async function rootLogin(){
  const code=document.getElementById("rootCode").value.trim().toUpperCase();
  const pin=document.getElementById("rootPin").value.trim();
  const err=document.getElementById("rootErr"); err.textContent="";
  try{
    const lk=await api("/lookup",{method:"POST",body:{code}});
    if(lk.kind!=="root") throw new Error("root degil");
    const d=await api("/login",{method:"POST",body:{userId:lk.members[0].id, pin}});
    authToken=d.token; session=d.user; authMode="root"; closeModal();
    document.getElementById("loginView").classList.add("hidden");
    await refreshState(); enterApp();
  }catch(e){ err.textContent="Kod veya PIN hatalı"; }
}

async function createFamily(){
  const name=document.getElementById("famName").value.trim();
  if(!name){ document.getElementById("famErr").textContent="Aile adı gir"; return; }
  const wasFirst = accountFamilies.length===0;   // ilk aile mi: kurulumda cocuk eklemeye yonlendir
  try{
    const r = await api("/account/create-family",{method:"POST",body:{name}});
    closeModal(); await loadAccount(); renderAccountHome(); toast("Aile oluşturuldu 🏡");
    if(wasFirst && r && r.family) setTimeout(()=>addChildPrompt(r.family.id), 450);
  }catch(e){ document.getElementById("famErr").textContent=e.message; }

  document.getElementById("invC").classList.toggle("active", r==="child");
  const cf=document.getElementById("invChildFields"); if(cf) cf.classList.toggle("hidden", r!=="child");

function invitePrompt(familyId){
  invRole="parent";
  showModal(`<h3>Aileye davet</h3>
    <div class="sub">${appConfig.emailCode?'Davet e-postayla gönderilir.':'E-posta servisi kapalı; davet linkini sen paylaşırsın.'}</div>

      <input id="invChildName" placeholder="Çocuğun adı" style="width:100%;box-sizing:border-box;padding:12px;border:2px solid var(--line);border-radius:10px;margin-bottom:8px">

        <input id="invChildAv" placeholder="Emoji" maxlength="2" value="🙂" style="flex:1;min-width:0;box-sizing:border-box;padding:12px;border:2px solid var(--line);border-radius:10px;margin-bottom:8px;text-align:center">

    <div class="pin-err" id="invErr"></div>

async function sendInvite(familyId){
  const email=document.getElementById("invEmail").value.trim().toLowerCase();
  if(!email){ document.getElementById("invErr").textContent="E-posta gir"; return; }
  const payload={familyId,email,role:invRole};
  if(invRole==="child"){
    const cn=document.getElementById("invChildName").value.trim();
    if(!cn){ document.getElementById("invErr").textContent="Çocuğun adını gir"; return; }
    payload.childName=cn;
    payload.childAge=document.getElementById("invChildAge").value.trim();
    payload.childAv=document.getElementById("invChildAv").value.trim()||"🙂";
  }
  try{
    const d=await api("/account/invite",{method:"POST",body:payload});
    await loadAccount(); renderAccountHome();
    const link = location.origin+"/?invite="+d.inviteToken;
    showModal(`<div style="text-align:center"><div style="font-size:38px">✉️</div><h3>Davet hazır</h3>
      <div class="sub">${escapeHtml(email)} · ${invRole==='child'?'çocuk':'ebeveyn'}</div>
      <div class="sub" style="margin-top:8px">Davet linki:</div>
      <div class="proof-box" style="word-break:break-all;font-size:12px">${escapeHtml(link)}</div>
      <button class="btn-ghost" style="width:100%;margin-top:8px" onclick="(navigator.clipboard&&navigator.clipboard.writeText('${link}').then(()=>toast('Kopyalandı 📋')))||toast('${link}')">📋 Kopyala</button>
      <button class="btn-primary" style="width:100%;margin-top:8px" onclick="closeModal()">Tamam</button></div>`);
  }catch(e){ document.getElementById("invErr").textContent=e.message; }
}

/* ---- COCUK MODU (Netflix profili) ---- */
function enterChildMode(childId){
  let child=null; accountFamilies.forEach(f=>{ const c=f.children.find(x=>x.id===childId); if(c) child=c; });
  if(child && child.hasPin){ childPinPrompt(childId, child.name); return; }
  doEnterChild(childId, "");
}
function childPinPrompt(childId, name){
  showModal(`<div style="text-align:center"><h3>${escapeHtml(name)}</h3><div class="sub">PIN gir</div>
    <input id="cpin" inputmode="numeric" maxlength="8" type="password" style="width:100%;box-sizing:border-box;padding:13px;font-size:20px;text-align:center;letter-spacing:6px;border:2px solid var(--line);border-radius:12px;margin:10px 0">
    <div class="pin-err" id="cpinErr"></div>
    <button class="btn-primary" style="width:100%" onclick="doEnterChild('${childId}', document.getElementById('cpin').value)">Gir</button></div>`);
  setTimeout(()=>{const i=document.getElementById("cpin");if(i)i.focus();},150);
}
async function doEnterChild(childId, pin){
  try{
    const d = await api("/account/child-token",{method:"POST",body:{childId, pin}});
    closeModal();
    authToken = d.token; authMode="child";
    document.getElementById("accountView").classList.add("hidden");
    await refreshState();
    enterApp();
  }catch(e){ const el=document.getElementById("cpinErr"); if(el) el.textContent="PIN hatalı"; else toast(e.message||"Girilemedi"); }
}

/* ---- EBEVEYN MODU (aile panosu) ---- */
async function enterParentMode(familyId){
  authMode="parent"; currentFamilyId=familyId; authToken=localStorage.getItem(ACC_TOKEN_KEY);
  document.getElementById("accountView").classList.add("hidden");
  try{ await refreshState(); enterApp(); }
  catch(e){ toast("Yüklenemedi: "+(e.message||"")); authMode="account"; showAccountHome(); }
}

/* ---- mod cikislari ---- */
function backToAccount(){
  authToken = localStorage.getItem(ACC_TOKEN_KEY);   // hesap oturumuna don
  showAccountHome();
}
function appExit(){ if(authMode==="root") logoutAccount(); else backToAccount(); }
function logoutAccount(){
  stopAutoRefresh(); removeFeedbackBubble();
  localStorage.removeItem(ACC_TOKEN_KEY);
  authToken=null; account=null; accountFamilies=[]; session=null; authMode="account"; currentFamilyId=null;
  document.getElementById("appView").classList.add("hidden");
  document.getElementById("accountView").classList.add("hidden");
  document.getElementById("wizardMount").innerHTML="";
  document.getElementById("loginView").classList.remove("hidden");
  resetTheme(); setAuthTab("login");
}

/* ======================= APP SHELL ======================= */
function enterApp(){
  document.getElementById("loginView").classList.add("hidden");
  // cocuk + tema yoksa once RPG sihirbazi
  if(session.role==="child" && !session.theme){ startWizard(); return; }
  document.getElementById("appView").classList.remove("hidden");
  document.getElementById("brandTop").textContent = APP_NAME;
  document.getElementById("whoLabel").innerHTML = `${escapeHtml(session.av)} <b>${escapeHtml(session.name)}</b>`;
  document.getElementById("backToAccBtn").classList.toggle("hidden", authMode==="root");   // root'ta panoya don yok
  if(session.role==="child") applyTheme(themeOf(session)); else resetTheme();
  renderApp();
  startAutoRefresh();
  removeFeedbackBubble();
  if(authMode==="child" || authMode==="parent") setTimeout(maybeShowFeedbackBubble, 70000);   // bir sure sonra geri bildirim baloncugu
  if(session.role==="child"){ setTimeout(showAnnouncements, 500); setTimeout(checkCheckpointCelebration, 1100); setTimeout(showApprovalReminder, 1700); setTimeout(showWeeklyReminder, 2300); }
}
function logout(){ logoutAccount(); }   // eski cagrilar icin alias

/* ---- oto-yenileme: 90 sn'de bir, modal/sihirbaz aciksa dokunma ---- */
let refreshTimer = null;
function startAutoRefresh(){
  stopAutoRefresh();
  refreshTimer = setInterval(async ()=>{
    if(!session) return;
    if(document.getElementById("modalMount").innerHTML) return;   // bir sey yaziyor/onayliyor olabilir
    if(document.getElementById("wizardMount").innerHTML) return;  // sihirbaz acik
    try{ await refreshState(); renderApp(); if(session.role==="child") checkCheckpointCelebration(); }catch(e){}
  }, 90000);
}
function stopAutoRefresh(){ if(refreshTimer){ clearInterval(refreshTimer); refreshTimer=null; } }
async function manualRefresh(){
  toast("Yenileniyor...");
  try{ await refreshState(); renderApp(); toast("Güncellendi ✓"); if(session.role==="child") setTimeout(checkCheckpointCelebration, 300); }
  catch(e){ toast("Yenilenemedi"); }
}

function wizClasses(){

function wizTutorial(){

function taskRow(task){
  const done = doneCount(session.id, task);
  const full = done>=task.target;
  const pendingN = compsFor(session.id, task.id, taskPeriod(task)).filter(c=>c.status==="pending").length;
  const active = inWindow(task);
  const locked = !active && !full;
  let cls="task", actionHTML="";
  let stateChip="";
  if(full){
    cls+=" complete";
    stateChip = pendingN>0
      ? `<span class="chip pending">⏳ ${pendingN} onayda</span>`
      : `<span class="chip done">✓ Tamam</span>`;
    actionHTML = `<span style="font-size:24px">✅</span>`;
  }else if(locked){
    cls+=" locked";
    actionHTML = `<button class="btn-do" disabled>Saati değil</button>`;
  }else{
    if(pendingN>0) { cls+=" waiting"; stateChip=`<span class="chip pending">⏳ ${pendingN} onayda</span>`; }
    actionHTML = `<button class="btn-do" onclick="openDo('${task.id}')">Yaptım</button>`;
  }
  const countChip = task.target>1 ? `<span class="chip count">${done}/${task.target}</span>` : "";
  const st = task.type==="daily" ? taskStreak(session.id, task.id) : 0;
  const streakChip = st>=STREAK_MIN ? `<span class="chip streak" title="${st} gün üst üste! Her gün +${STREAK_BONUS} ⭐ bonus">🔥 ${st}g · +${STREAK_BONUS}</span>` : "";
  const tt = themed(task);
  const variant = tv(task, session.age);
  const subText = tt.sub || (task.sub||"");
  const hintLine = (variant && variant.hint) ? `<div style="font-size:11px;color:var(--accent);margin-top:2px;font-weight:600">▸ ${variant.hint}</div>` : "";
  return `
    <div class="${cls}">
      <div class="t-ico">${task.emoji}</div>
      <div class="t-body">
        <div class="t-title">${tt.title}</div>
        ${subText?`<div style="font-size:12px;color:var(--muted);margin-top:1px">${subText}</div>`:""}
        ${hintLine}
        <div class="t-meta">
          <span class="chip xp">+${task.xp} ⭐</span>
          <span class="chip win">🕐 ${winLabel(task)}</span>
          ${countChip}${streakChip}${stateChip}
        </div>
      </div>
      <div class="t-action">${actionHTML}</div>
    </div>`;
}
function leaderboardHTML(highlight){

let pendingPhoto = null;
function taskById(taskId){
  let t = TASKS.find(x=>x.id===taskId);

function openDo(taskId){
  const task = taskById(taskId);
  if(!task) return;
  if(task.ai){ openLearnChat(task); return; }   // ogrenme gorevi = sohbet
  pendingPhoto = null;
  const variant = tv(task, session.age);

  const hintLine = (variant && variant.hint) ? `<div class="ai-note" style="margin-bottom:10px">💡 ${variant.hint}</div>` : "";
  let inner = "";
  if(task.proof==="text"){
    inner = `${hintLine}<div class="field"><label>${task.id==='ogren'?'Ne öğrendin? Kendi cümlelerinle anlat:':'Ne okudun? Kısaca anlat:'}</label>
      <textarea id="proofText" rows="5" placeholder="${ph}"></textarea></div>`;
  }else if(task.proof==="photo"){
    inner = `<div class="field"><label>Fotoğraf ekle (isteğe bağlı):</label>
      <label class="photo-pick" id="photoLabel">
        📷 Fotoğraf seç<br><small>Telefondan çek veya galeriden seç</small>
        <input type="file" accept="image/*" capture="environment" style="display:none" onchange="pickPhoto(event)">
      </label></div>
      <div class="field"><label>Not (isteğe bağlı):</label><input type="text" id="proofText" placeholder="İstersen birşey yaz"></div>`;
  }else{
    inner = `<p style="color:var(--muted);font-size:14px;margin:0 0 10px">Görevi yaptıysan onaya gönder. ${user(session.parents?.[0])?.name||'Ailen'} onaylayacak.</p>`;
  }
  const tt = themed(task);
  const th = themeOf(session);
  showModal(`
    <h3>${task.emoji} ${tt.title}</h3>
    <div class="msub">+${task.xp} ⭐ · ${th?th.approval:'Onay'} sonrası eklenir</div>
    ${inner}
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Vazgeç</button>
      <button class="btn-primary" onclick="submitDo('${task.id}')">Onaya Gönder</button>
    </div>
  `);
}
function pickPhoto(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement("canvas");
      const sc=Math.min(1,300/img.width);
      cv.width=img.width*sc; cv.height=img.height*sc;
      cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
      pendingPhoto=cv.toDataURL("image/jpeg",0.6);
      document.getElementById("photoLabel").innerHTML=`<img src="${pendingPhoto}"><br><small>Değiştirmek için dokun</small><input type="file" accept="image/*" capture="environment" style="display:none" onchange="pickPhoto(event)">`;
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
async function submitDo(taskId){
  const task=taskById(taskId);
  const txtEl=document.getElementById("proofText");
  const txt = txtEl?txtEl.value.trim():"";
  if(task.proof==="text" && txt.length<3){ toast("Lütfen birkaç cümle yaz"); return; }
  const btn = document.querySelector(".modal .btn-primary");
  if(btn){ btn.disabled=true; btn.textContent= task.ai ? "Yardımcı okuyor..." : "Gönderiliyor..."; }
  try{
    const r = await api("/completion", {method:"POST", body:{
      taskId:task.id, date:todayStr(), week:weekKey(),
      proofText:txt, photoB64:pendingPhoto
    }});
    if(r.rejected){
      // AI begenmedi: modal acik kalsin, yorumu goster, cocuk duzeltsin
      showAiReject(r.aiNote.note);
      if(btn){ btn.disabled=false; btn.textContent="Tekrar Gönder"; }
      return;
    }
    closeModal();
    await refreshState();
    renderChild();
    if(r.autoApproved){ showCelebrate(r.aiNote?r.aiNote.note:"Harika!", task.xp); }
    else { toast("Onaya gönderildi! ⏳"); }
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent="Onaya Gönder"; }
    toast("Hata: "+e.message);
  }
}

/* gorsel kutlama: konfeti */
function fireConfetti(){
  const w=document.createElement("div"); w.className="confetti-wrap";
  const cols=["#FF7A18","#FFD166","#6C2BD9","#2E7D32","#00E5FF","#FF3DCB"];
  for(let i=0;i<34;i++){ const p=document.createElement("div"); p.className="confetti";
    p.style.left=(Math.random()*100).toFixed(1)+"%"; p.style.background=cols[i%cols.length];
    p.style.animationDelay=(Math.random()*0.5).toFixed(2)+"s"; w.appendChild(p); }
  document.body.appendChild(w);
  setTimeout(()=>w.remove(), 2800);
}

};
const LEARN_MOOD = {
  scifi:"Uzay gemisi/galaktik kaşif temasında konuş, ara sıra 'Kaptan' diye hitap et.",
  fantasy:"Fantastik diyar/şövalye temasında konuş, 'genç şövalye/kaşif' gibi hitap et.",

  hero:"Süper kahraman temasında konuş, 'kahraman' diye hitap et, cesaret ve iyilik vurgula.",
  dino:"Dinozor/kazı temasında konuş, 'kâşif' diye hitap et, fosil ve macera benzetmeleri kullan."
};
let chatMessages = [];
let chatBusy = false;
function chatBot(){ const th=themeOf(session); return th?th.bot:{name:"Rehber",ico:"🤖"}; }
function openLearnChat(task){
  const th = themeOf(session);
  const hello = LEARN_HELLO[th?th.id:"default"] || LEARN_HELLO.default;
  chatMessages = [{role:"assistant", content:hello}];
  chatBusy = false;
  const bot = chatBot();
  showModal(`
    <h3>${bot.ico} ${bot.name}</h3>
    <div class="msub">${task.emoji} ${themed(task).title} · gerçekten öğrendiğini göster, yıldızı kap ⭐</div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" maxlength="600" placeholder="Buraya yaz..." onkeydown="if(event.key==='Enter')sendChat()">
      <button class="btn-primary" id="chatSend" onclick="sendChat()">Gönder</button>
    </div>
    <button class="btn-ghost" style="width:100%;margin-top:10px" onclick="closeModal()">Kapat</button>
  `);
  renderChatMsgs();
  setTimeout(()=>{ const i=document.getElementById("chatInput"); if(i) i.focus(); }, 120);
}
function renderChatMsgs(){
  const c=document.getElementById("chatMsgs"); if(!c) return;
  const ico = chatBot().ico;
  c.innerHTML = chatMessages.map(m=> m.role==="assistant"
    ? `<div class="chat-bubble bot">${ico} ${escapeHtml(m.content)}</div>`
    : `<div class="chat-bubble me">${escapeHtml(m.content)}</div>`).join("")
    + (chatBusy?`<div class="chat-bubble bot">${ico} <i>yazıyor...</i></div>`:"");
  c.scrollTop = c.scrollHeight;
}
async function sendChat(){
  if(chatBusy) return;
  const inp=document.getElementById("chatInput"); if(!inp || inp.disabled) return;
  const txt=inp.value.trim(); if(txt.length<2) return;
  chatMessages.push({role:"user", content:txt}); inp.value="";
  chatBusy=true; renderChatMsgs();
  const th=themeOf(session); const bot=chatBot();
  try{
    const r = await api("/learn-chat", {method:"POST", body:{
      messages:chatMessages, date:todayStr(), week:weekKey(),
      botName:bot.name, themeMood:(th?LEARN_MOOD[th.id]:"")||""
    }});
    chatBusy=false;
    chatMessages.push({role:"assistant", content:r.reply});
    renderChatMsgs();
    if(r.justWon){
      // yildiz kazanildi AMA sohbet acik kalir, cocuk merak ederse devam eder
      await refreshState(); renderChild(); fireConfetti();
      toast("⭐ Yıldızını kazandın! İstersen sohbete devam et.");
    } else if(r.done && !r.passed){
      const send=document.getElementById("chatSend"); if(send) send.disabled=true;
      if(inp){ inp.disabled=true; inp.placeholder="Biraz daha araştırıp tekrar gel 💪"; }
    }
  }catch(e){
    chatBusy=false;
    chatMessages.push({role:"assistant", content:"Bir sorun oldu, tekrar dener misin?"});
    renderChatMsgs();
  }
}

const FB_KEY = "gp_fb_state";
function fbState(){ try{ return JSON.parse(localStorage.getItem(FB_KEY)||"{}"); }catch(e){ return {}; } }

function maybeShowFeedbackBubble(){
  if(authMode!=="child" && authMode!=="parent") return;     // yalniz cocuk/ebeveyn
  if(document.getElementById("modalMount").innerHTML) return;
  if(document.getElementById("fbBubble")) return;
  const s=fbState(), now=Date.now();
  if(s.submitted && now-s.submitted < 30*86400000) return;   // gonderdiyse 30 gun sus
  if(s.dismissed && now-s.dismissed < 7*86400000) return;    // kapattiysa 7 gun sus
  const th=(authMode==="child")?themeOf(session):null, bot=th?th.bot:null;
  const color=th?th.colors.primary:"#6C2BD9";
  const label=th?`${bot.ico} ${escapeHtml(bot.name)} sana bir şey soracak!`:"💬 Nasıl gidiyor?";
  const b=document.createElement("div"); b.id="fbBubble";
  b.style.cssText=`position:fixed;right:14px;bottom:16px;z-index:900;display:flex;align-items:center;gap:8px;background:${color};color:#fff;padding:11px 15px;border-radius:99px;box-shadow:0 12px 30px -8px rgba(0,0,0,.5);cursor:pointer;font-weight:700;font-size:14px;max-width:84vw;animation:fbpop .45s cubic-bezier(.2,.8,.3,1.4)`;
  b.innerHTML=`<span>${label}</span><span id="fbX" style="opacity:.75;font-size:19px;line-height:1">×</span>`;

function urlB64ToUint8(s){
  const pad="=".repeat((4-s.length%4)%4); const b=(s+pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(b); return Uint8Array.from(raw, c=>c.charCodeAt(0));

    if(!reg){ toast("Bildirim kurulamadı"); return; }
    let sub = await reg.pushManager.getSubscription();
    if(!sub) sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC) });
    // hesap-modu (parent): account_id ile anahtarlanan account/push-subscribe ucuna (pwrite /account ekler + familyId enjekte eder); aksi halde user token'la /push-subscribe
    if(authMode==="parent") await pwrite("/push-subscribe", { subscription: sub.toJSON() });
    else await api("/push-subscribe", {method:"POST", body:{ subscription: sub.toJSON() }});
    toast("Bildirimler açıldı 🔔");
    const b=document.getElementById("pushBtn"); if(b) b.textContent="🔔 Bildirimler açık";
  }catch(e){ toast("Hata: "+e.message); }
}

/* ======================= BOOT ======================= */
async function boot(){
  registerSW();
  document.getElementById("brandTitle").textContent = APP_NAME;
  await loadConfig();
  const params = new URLSearchParams(location.search);
  if(params.has("admin")){ setAuthTab("login"); setTimeout(rootLoginPrompt, 300); return; }   // gizli sistem girisi (/admin)
  pendingInvite = params.get("invite");   // ?invite=... davet linki
  const t = localStorage.getItem(ACC_TOKEN_KEY);
  if(t){
    authToken = t;
    try{
      await loadAccount();                       // token gecerli: hesap yuklendi
      if(pendingInvite){ await tryAcceptInvite(pendingInvite); pendingInvite=null; }
      showAccountHome(); return;
    }catch(e){ localStorage.removeItem(ACC_TOKEN_KEY); authToken=null; }   // token bozuk: girise dus
  }
  setAuthTab("login");
  if(pendingInvite){ const el=document.getElementById("authErr"); if(el) el.textContent="Daveti kabul etmek için önce giriş yap veya kayıt ol."; }
}

/* ---- tarayici geri tusu: site icinde gezinsin, yanlislikla siteden cikmasin ---- */
function navBuffer(){ try{ history.pushState(null, "", location.href); }catch(e){} }
window.addEventListener("popstate", function(){
  const loginVisible = !document.getElementById("loginView").classList.contains("hidden");
  const modalOpen = !!document.getElementById("modalMount").innerHTML;
  if(loginVisible && !modalOpen){ return; }                         // giris ekrani: geri ile cikabilir
  navBuffer();                                                       // diger her yerde cikisi engelle
  if(modalOpen){ closeModal(); return; }                            // once acik modali kapat
  if(document.getElementById("wizardMount").innerHTML){ return; }   // sihirbazda kal
  if(authMode==="child" || authMode==="parent"){ backToAccount(); return; }  // app -> pano
  // pano / root: sitede kal
});
navBuffer();
boot();
</script>
