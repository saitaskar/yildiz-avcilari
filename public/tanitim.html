<style>
:root{
  --bg:#0E0A2A; --bg2:#1A1147; --card:rgba(255,255,255,.06); --line:rgba(255,255,255,.12);
  --ink:#fff; --ink70:rgba(255,255,255,.74); --ink55:rgba(255,255,255,.55);
  --primary:#6C2BD9; --primary-deep:#4A148C; --gold:#FFD166; --pink:#FF6FB5; --cyan:#5EE7FF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#fff;line-height:1.6;overflow-x:hidden;}
a{color:inherit;}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(1.5px 1.5px at 20px 30px,#fff,transparent),radial-gradient(1.5px 1.5px at 130px 80px,#fff8,transparent),radial-gradient(2px 2px at 220px 50px,#fff,transparent),radial-gradient(1.5px 1.5px at 300px 140px,#fffa,transparent),radial-gradient(1.5px 1.5px at 80px 180px,#fff7,transparent);
  background-repeat:repeat;background-size:340px 220px;opacity:.5;animation:tw 6s ease-in-out infinite;}
@keyframes tw{0%,100%{opacity:.35}50%{opacity:.6}}
.bgglow{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(600px 400px at 50% -10%,rgba(108,43,217,.55),transparent),
  radial-gradient(500px 360px at 90% 20%,rgba(255,111,181,.25),transparent),
  radial-gradient(500px 360px at 5% 60%,rgba(94,231,255,.18),transparent);}
.wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:0 22px;}

header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 0;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:9px;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:20px;}
.logo .s{font-size:24px;filter:drop-shadow(0 0 8px var(--gold));}
.head-r{display:flex;align-items:center;gap:10px;}
.lang{display:flex;gap:0;background:rgba(255,255,255,.08);border:1px solid var(--line);border-radius:99px;overflow:hidden;}
.lang button{background:transparent;border:none;color:var(--ink55);padding:7px 13px;font-weight:800;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;}
.lang button.on{background:var(--primary);color:#fff;}
.nav-cta{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;text-decoration:none;font-weight:700;padding:9px 18px;border-radius:99px;font-size:14px;white-space:nowrap;}

.hero{text-align:center;padding:42px 0 26px;}
.hero .badge{display:inline-block;background:rgba(255,209,102,.16);border:1px solid rgba(255,209,102,.4);color:var(--gold);font-weight:700;font-size:12.5px;letter-spacing:.04em;padding:6px 14px;border-radius:99px;text-transform:uppercase;}
.hero h1{font-family:'Baloo 2',sans-serif;font-size:clamp(34px,7.5vw,62px);font-weight:700;line-height:1.05;margin:18px 0 0;letter-spacing:-.01em;}
.hero h1 em{font-style:normal;background:linear-gradient(120deg,var(--gold),var(--pink));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.hero .lead-p{color:var(--ink70);font-size:clamp(16px,2.4vw,19px);max-width:600px;margin:18px auto 0;}
.cta{display:inline-block;margin-top:26px;padding:17px 44px;border-radius:18px;text-decoration:none;font-family:'Baloo 2',sans-serif;font-weight:700;font-size:19px;color:#fff;background:linear-gradient(135deg,var(--primary),var(--pink));box-shadow:0 16px 40px -12px rgba(255,111,181,.6);transition:transform .15s;}
.cta:hover{transform:translateY(-2px);}
.cta-sub{font-size:13px;color:var(--ink55);margin-top:12px;}
.silo{margin:30px auto 0;width:170px;height:124px;position:relative;}
.silo .planet{position:absolute;border-radius:50%;animation:float 5s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

.section{padding:34px 0;}
.lead{text-align:center;font-size:12.5px;letter-spacing:.18em;color:var(--gold);font-weight:800;text-transform:uppercase;margin-bottom:8px;}
.h2{font-family:'Baloo 2',sans-serif;font-size:clamp(24px,4.5vw,34px);text-align:center;font-weight:700;line-height:1.15;}
.sub{text-align:center;color:var(--ink70);max-width:600px;margin:10px auto 26px;font-size:15.5px;}

.how{max-width:620px;margin:0 auto;}
.step{display:flex;gap:15px;align-items:flex-start;margin-bottom:14px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:16px;padding:16px 18px;}
.step .n{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--gold),var(--pink));color:#1C1340;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto;font-family:'Baloo 2',sans-serif;}
.step b{display:block;font-size:16px;font-family:'Baloo 2',sans-serif;font-weight:600;}
.step small{color:var(--ink70);font-size:14px;}

/* reveal slider */
.silo-card{background:linear-gradient(160deg,#241046,#3A1D6E);border:1px solid var(--line);border-radius:24px;padding:28px 22px;text-align:center;max-width:560px;margin:0 auto;}
.silo-stage{position:relative;height:200px;display:flex;align-items:center;justify-content:center;}
.silo-glow{position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,111,181,.5),transparent 65%);filter:blur(10px);}
.silo-gift{position:relative;font-size:124px;line-height:1;transition:filter .25s ease;}
.reveal-text{font-weight:800;font-size:18px;min-height:24px;margin-top:6px;}
.xpbar{height:16px;background:rgba(255,255,255,.18);border-radius:10px;overflow:hidden;margin:14px 0 8px;}
.xpbar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--pink));border-radius:10px;transition:width .2s;}
.slider-row{display:flex;align-items:center;gap:12px;margin-top:14px;}
.slider-row span{font-size:12px;color:var(--ink55);white-space:nowrap;}
input[type=range]{flex:1;accent-color:var(--pink);height:6px;}
.silo-hint{font-size:13px;color:#D7C9F2;margin-top:14px;}

/* checkpoint demo */
.cp-card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:24px 20px;max-width:560px;margin:0 auto;}
.cp-bar{position:relative;height:16px;background:rgba(255,255,255,.12);border-radius:10px;margin:6px 0 20px;}
.cp-fill{position:absolute;height:100%;width:42%;background:linear-gradient(90deg,var(--gold),var(--pink));border-radius:10px;}
.cp-tick{position:absolute;top:0;width:3px;height:100%;background:var(--gold);box-shadow:0 0 7px rgba(255,209,102,.95);transform:translateX(-50%);border-radius:2px;}
.cp-tick.off{background:rgba(255,255,255,.5);box-shadow:none;}
.cp-item{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;padding:9px 13px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;text-align:left;}

/* worlds */
.themes{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:13px;}
.theme{border-radius:20px;padding:18px 16px;color:#fff;min-height:158px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,.14);}
.theme .ico{font-size:38px;}
.theme .cls{font-size:11px;font-weight:800;opacity:.85;text-transform:uppercase;letter-spacing:.08em;}
.theme .nm{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:17px;margin:2px 0 6px;}
.theme .ex{font-size:12.5px;opacity:.94;line-height:1.4;}

/* device mockups */
.screen{background:#140E2E;border:1px solid var(--line);border-radius:20px;padding:16px;max-width:430px;margin:0 auto;}
.screen-title{font-size:14px;font-weight:800;font-family:'Baloo 2',sans-serif;}
.screen-sub{font-size:12px;color:var(--ink55);margin-bottom:14px;}
.tk{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px;}
.tk-ico{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.tk-b{flex:1;min-width:0;text-align:left;}
.tk-t{font-weight:700;font-size:14px;}
.tk-m{margin-top:3px;}
.tk-chip{display:inline-block;background:rgba(255,209,102,.18);color:var(--gold);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;margin-right:4px;}
.tk-chip.win{background:rgba(94,231,255,.16);color:var(--cyan);}
.tk-chip.fire{background:rgba(255,111,181,.18);color:var(--pink);}
.tk-btn{background:var(--primary);color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;flex-shrink:0;}
.tk-done{color:#5EE7FF;font-size:22px;flex-shrink:0;}
.ap{border:1px solid var(--line);border-radius:14px;padding:14px;text-align:left;}
.ap-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.ap-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;}
.ap-proof{background:rgba(108,43,217,.22);border-radius:10px;padding:9px 12px;font-size:13px;margin:8px 0;color:#D7C9F2;}
.ap-acts{display:flex;gap:8px;margin-top:10px;}
.ap-ok{flex:1;background:linear-gradient(135deg,#1f9d55,#2bbd6e);color:#fff;border-radius:10px;padding:9px;text-align:center;font-weight:700;font-size:13px;}
.ap-no{flex:1;border:2px solid rgba(255,111,181,.6);color:#ffb3d4;border-radius:10px;padding:9px;text-align:center;font-weight:700;font-size:13px;}

/* chat */
.chat{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;max-width:560px;margin:0 auto;}
.chat-head{font-size:13px;color:var(--ink55);margin-bottom:12px;text-align:center;}
.bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;max-width:86%;margin-bottom:8px;}
.bubble.bot{background:rgba(255,255,255,.09);color:#fff;border-bottom-left-radius:4px;}
.bubble.me{background:var(--primary);color:#fff;border-bottom-right-radius:4px;margin-left:auto;}
.bubble.win{background:linear-gradient(90deg,#1f9d55,#2bbd6e);color:#fff;text-align:center;max-width:100%;font-weight:700;}

/* motivation */
.mot{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
.mc{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 20px;text-align:center;}
.mc .e{font-size:34px;}
.mc h3{font-family:'Baloo 2',sans-serif;font-size:17px;margin:8px 0 5px;font-weight:600;}
.mc p{font-size:14px;color:var(--ink70);}

.pillrow{text-align:center;}
.pill{display:inline-block;background:rgba(94,231,255,.1);border:1px solid rgba(94,231,255,.28);color:var(--cyan);border-radius:20px;padding:6px 13px;font-size:12.5px;font-weight:700;margin:3px;}

.trust{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px 24px;margin:14px 0;text-align:center;}
.trust h2{font-family:'Baloo 2',sans-serif;font-size:21px;margin-bottom:8px;font-weight:600;}
.trust .tpills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px;}

.bottom{text-align:center;padding:30px 0 20px;}
footer{text-align:center;color:var(--ink55);font-size:13px;padding:30px 0 48px;border-top:1px solid var(--line);margin-top:24px;}
footer a{color:var(--ink70);text-decoration:none;font-weight:700;margin:0 5px;}
footer a:hover{color:#fff;}
@media(max-width:560px){ .hero{padding-top:28px;} }
</style>
</head>

function initSlider(){
  const t=T[lang];
  const slider=document.getElementById('slider'), silo=document.getElementById('silo'),
        bar=document.getElementById('bar'), pctLabel=document.getElementById('pctLabel'),
        glow=document.getElementById('glow'), revText=document.getElementById('revText');
  function draw(pct){
    const f=pct/100;
    silo.style.filter=`brightness(${f.toFixed(2)}) blur(${(12*(1-f)).toFixed(1)}px) saturate(${(0.3+f).toFixed(2)})`;
    bar.style.width=pct+"%"; pctLabel.textContent=(lang==="tr"?"%"+pct:pct+"%");
    glow.style.opacity=(f*0.9+0.1).toFixed(2);
    let m=t.miles[0][1]; for(const [k,v] of t.miles){ if(pct>=k) m=v; }
    revText.textContent=m; revText.style.color = pct>=100 ? "var(--gold)" : "#fff";
  }
  slider.addEventListener('input',e=>draw(+e.target.value));
  draw(+slider.value);
}
