<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yıldız Avcıları — Tanıtım / Showcase</title>
<meta name="description" content="Çocuklara oyunlaştırma ile iyi alışkanlık kazandıran RPG temalı aile görev portalı. A gamified, RPG-themed family task portal that helps kids build good habits.">
<style>
  :root{
    --primary:#6C2BD9; --primary-dark:#4A148C; --accent:#FF7A18;
    --bg:#0E0A1F; --card:#1A1430; --text:#EDE9F7; --muted:#9A8FB8; --line:#2A2348;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
  a{color:inherit;}
  .wrap{max-width:880px;margin:0 auto;padding:0 20px;}
  .section{padding:50px 0;}
  h1,h2,h3{line-height:1.2;}
  .btn{display:inline-block;background:linear-gradient(90deg,var(--accent),#FFD166);color:#1A0F00;border-radius:30px;padding:14px 32px;font-weight:800;font-size:16px;text-decoration:none;box-shadow:0 8px 30px rgba(255,122,24,.35);transition:.15s;}
  .btn:active{transform:scale(.97);}

  /* dil secici */
  .lang{position:fixed;top:14px;right:14px;z-index:100;display:flex;gap:0;background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;}
  .lang button{background:transparent;border:none;color:var(--muted);padding:7px 14px;font-weight:800;font-size:13px;cursor:pointer;}
  .lang button.on{background:var(--primary);color:#fff;}

  .hero{text-align:center;padding:74px 20px 40px;background:radial-gradient(1px 1px at 20% 30%,#fff,transparent),radial-gradient(1px 1px at 70% 50%,#fff,transparent),radial-gradient(2px 2px at 40% 80%,#9bd,transparent),radial-gradient(1px 1px at 85% 25%,#fff,transparent),linear-gradient(160deg,#140C2E,#2A1055);}
  .hero .logo{font-size:64px;}
  .hero h1{font-size:38px;margin:10px 0 8px;background:linear-gradient(90deg,#FFD166,#FF7A18);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .hero .slogan{font-size:18px;color:#C9BEEA;margin-bottom:8px;}
  .hero .desc{color:var(--muted);max-width:580px;margin:0 auto 26px;line-height:1.6;}

  .lead{text-align:center;font-size:13px;letter-spacing:3px;color:var(--accent);font-weight:800;text-transform:uppercase;margin-bottom:10px;}
  .h2{text-align:center;font-size:26px;margin-bottom:8px;}
  .sub{text-align:center;color:var(--muted);max-width:560px;margin:0 auto 30px;line-height:1.6;}

  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .step{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px 14px;text-align:center;}
  .step .e{font-size:34px;}
  .step h3{font-size:15px;margin:10px 0 6px;}
  .step p{font-size:12.5px;color:var(--muted);line-height:1.45;}

  .silo-card{background:linear-gradient(160deg,#241046,#3A1D6E);border-radius:24px;padding:28px 22px;text-align:center;border:1px solid var(--line);}
  .silo-stage{position:relative;height:210px;display:flex;align-items:center;justify-content:center;}
  .silo-glow{position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(255,122,24,.45),transparent 65%);filter:blur(10px);}
  .silo-gift{position:relative;font-size:128px;line-height:1;transition:filter .25s ease;}
  .reveal-text{font-weight:800;font-size:18px;min-height:24px;margin-top:6px;}
  .xpbar{height:16px;background:rgba(255,255,255,.18);border-radius:10px;overflow:hidden;margin:14px 0 8px;}
  .xpbar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#FFD166);border-radius:10px;transition:width .2s;}
  .slider-row{display:flex;align-items:center;gap:12px;margin-top:16px;}
  .slider-row span{font-size:12px;color:var(--muted);white-space:nowrap;}
  input[type=range]{flex:1;accent-color:var(--accent);height:6px;}
  .silo-hint{font-size:13px;color:#C9BEEA;margin-top:14px;}

  .cine-mock{background:linear-gradient(160deg,#140C2E,#2A1055);border:1px solid var(--line);border-radius:24px;padding:30px 22px;text-align:center;}
  .cine-badge{font-size:12px;letter-spacing:4px;color:#FFD166;font-weight:800;margin-bottom:14px;}
  .cine-h{font-size:24px;font-weight:800;background:linear-gradient(90deg,#FFD166,#FF7A18);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px;line-height:1.3;}

  .themes{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .theme{border-radius:20px;padding:20px 16px;color:#fff;min-height:150px;display:flex;flex-direction:column;justify-content:space-between;}
  .theme .ico{font-size:40px;}
  .theme .cls{font-size:11px;font-weight:700;opacity:.85;text-transform:uppercase;letter-spacing:1px;}
  .theme .nm{font-weight:800;font-size:17px;margin:2px 0 6px;}
  .theme .ex{font-size:12.5px;opacity:.92;line-height:1.4;}
  .t-scifi{background:linear-gradient(135deg,#0A1530,#00415C);}
  .t-fantasy{background:linear-gradient(135deg,#3A2A14,#1F3A1E);}
  .t-pixel{background:linear-gradient(135deg,#1F3A1E,#3A2A14);}

  .screen{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;max-width:430px;margin:0 auto;}
  .screen-title{font-size:14px;font-weight:800;}
  .screen-sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .tk{display:flex;align-items:center;gap:11px;padding:11px;border:1px solid var(--line);border-radius:12px;margin-bottom:9px;}
  .tk-ico{width:42px;height:42px;border-radius:10px;background:#2A2348;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
  .tk-b{flex:1;min-width:0;text-align:left;}
  .tk-t{font-weight:700;font-size:14px;}
  .tk-m{margin-top:3px;}
  .tk-chip{display:inline-block;background:#3A2A14;color:#FFD166;border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;margin-right:4px;}
  .tk-chip.win{background:#1F3A1E;color:#7ED99B;}
  .tk-btn{background:var(--primary);color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;flex-shrink:0;}
  .tk-done{color:#43A047;font-size:22px;flex-shrink:0;}
  .ap{border:1px solid var(--line);border-radius:14px;padding:14px;text-align:left;}
  .ap-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .ap-av{width:34px;height:34px;border-radius:50%;background:#2A2348;display:flex;align-items:center;justify-content:center;font-size:18px;}
  .ap-proof{background:#241B3D;border-radius:10px;padding:9px 12px;font-size:13px;margin:8px 0;color:#C9BEEA;}
  .ap-acts{display:flex;gap:8px;margin-top:10px;}
  .ap-ok{flex:1;background:#2E7D32;color:#fff;border-radius:10px;padding:9px;text-align:center;font-weight:700;font-size:13px;}
  .ap-no{flex:1;border:2px solid #C62828;color:#ff8a8a;border-radius:10px;padding:9px;text-align:center;font-weight:700;font-size:13px;}

  .chat{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;max-width:560px;margin:0 auto;}
  .chat-head{font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center;}
  .bubble{padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.45;max-width:85%;margin-bottom:8px;}
  .bubble.bot{background:#2A2348;color:var(--text);border-bottom-left-radius:4px;}
  .bubble.me{background:var(--primary);color:#fff;border-bottom-right-radius:4px;margin-left:auto;}
  .bubble.win{background:linear-gradient(90deg,#2E7D32,#43A047);color:#fff;text-align:center;max-width:100%;font-weight:700;}

  .cp-demo-bar{position:relative;height:16px;background:rgba(255,255,255,.12);border-radius:10px;margin:6px 0 22px;}
  .cp-demo-fill{position:absolute;height:100%;width:42%;background:linear-gradient(90deg,var(--accent),#FFD166);border-radius:10px;}
  .cp-demo-tick{position:absolute;top:0;width:3px;height:100%;background:#FFD166;box-shadow:0 0 7px rgba(255,209,102,.95);transform:translateX(-50%);border-radius:2px;}
  .cp-demo-tick.off{background:rgba(255,255,255,.5);box-shadow:none;}
  .cp-demo-item{display:flex;justify-content:space-between;gap:10px;font-size:13px;padding:8px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:7px;text-align:left;}

  footer{text-align:center;padding:40px 20px 60px;color:var(--muted);border-top:1px solid var(--line);margin-top:20px;}
  footer a{color:var(--accent);text-decoration:none;font-weight:700;}
  .pill{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);margin:3px;}

  @media(max-width:640px){ .steps{grid-template-columns:1fr 1fr;} .themes{grid-template-columns:1fr;} .hero h1{font-size:30px;} }
</style>
</head>
<body>

      <div class="cine-mock">
        <div class="cine-badge">${t.cineBadge}</div>
        <div class="cine-h">${t.cineH}</div>
        <div style="color:#C9BEEA;font-size:14px;line-height:1.55">${t.cineTxt}</div>
        <div style="margin-top:18px;font-size:12.5px;color:var(--muted)">${t.cineSteps}</div>
      </div>
    </div>

    <div class="section wrap">
      <div class="lead">${t.worldLead}</div><div class="h2">${t.worldH}</div>
      <p class="sub">${t.worldSub}</p>
      <div class="themes">
        ${t.themes.map((th,i)=>`<div class="theme ${['t-scifi','t-fantasy','t-pixel'][i]}"><div><div class="ico">${th[0]}</div><div class="cls">${th[1]}</div><div class="nm">${th[2]}</div></div><div class="ex">${th[3]}</div></div>`).join("")}
      </div>
    </div>

    <div class="section wrap">
      <div class="lead">${t.kidLead}</div><div class="h2">${t.kidH}</div>
      <p class="sub">${t.kidSub}</p>
      <div class="screen">
        <div class="screen-title">${t.kidScreenTitle}</div><div class="screen-sub">${t.kidScreenSub}</div>
        ${t.kidTasks.map(k=>`<div class="tk"><div class="tk-ico">${k[0]}</div><div class="tk-b"><div class="tk-t">${k[1]}</div><div class="tk-m"><span class="tk-chip${k[3]==='done'?' win':''}">${k[2]}</span></div></div>${k[3]==='done'?'<div class="tk-done">✅</div>':`<div class="tk-btn">${k[4]}</div>`}</div>`).join("")}
      </div>
    </div>

    <div class="section wrap">
      <div class="lead">${t.famLead}</div><div class="h2">${t.famH}</div>
      <p class="sub">${t.famSub}</p>
      <div class="screen">
        <div class="screen-title">${t.famTitle}</div><div class="screen-sub">${t.famSub2}</div>
        <div class="ap">
          <div class="ap-h"><div class="ap-av">🦁</div><div><b style="font-size:14px">${t.famName}</b> ${t.famTask}<div style="font-size:11px;color:var(--muted)">${t.famWhen}</div></div></div>
          <div class="ap-proof">${t.famProof}</div>
          <div class="ap-acts"><div class="ap-no">${t.famNo}</div><div class="ap-ok">${t.famOk}</div></div>
        </div>
      </div>
    </div>

    <div class="section wrap">
      <div class="lead">${t.learnLead}</div><div class="h2">${t.learnH}</div>
      <p class="sub">${t.learnSub}</p>
      <div class="chat">
        <div class="chat-head">${t.chatHead}</div>
        ${t.chat.map(m=>`<div class="bubble ${m[0]}">${m[1]}</div>`).join("")}
      </div>
    </div>

    <div class="section wrap" style="text-align:center">
      <div class="lead">${t.taskLead}</div><div class="h2">${t.taskH}</div>
      <p class="sub">${t.taskSub}</p>
      <div>${t.pills.map(p=>`<span class="pill">${p}</span>`).join("")}</div>
    </div>

    <footer>
      <div style="font-size:30px">🌟</div>
      <p style="margin:10px 0">${t.footTxt}</p>
      <p><a href="/">${t.footLink}</a></p>
    </footer>
  `;
  initSlider();
}

function initSlider(){
  const t=T[lang];
  const slider=document.getElementById('slider'), silo=document.getElementById('silo'),
        bar=document.getElementById('bar'), pctLabel=document.getElementById('pctLabel'),
        glow=document.getElementById('glow'), revText=document.getElementById('revText');
  function draw(pct){
    const f=pct/100;
    silo.style.filter=`brightness(${f.toFixed(2)}) blur(${(12*(1-f)).toFixed(1)}px) saturate(${(0.3+f).toFixed(2)})`;
    bar.style.width=pct+"%"; pctLabel.textContent=(lang==="tr"?"%":"")+pct+(lang==="en"?"%":"");
    glow.style.opacity=(f*0.9+0.1).toFixed(2);
    let m=t.miles[0][1]; for(const [k,v] of t.miles){ if(pct>=k) m=v; }
    revText.textContent=m; revText.style.color = pct>=100 ? "#FFD166" : "#fff";
  }
  slider.addEventListener('input',e=>draw(+e.target.value));
  draw(+slider.value);
}
function setLang(l){ lang=l; render(); }
render();
</script>
</body>
</html>
